name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # ── Install Docker if not present ──
            if ! command -v docker &> /dev/null; then
              echo "Installing Docker..."
              sudo apt-get update -y
              sudo apt-get install -y ca-certificates curl gnupg
              sudo install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              sudo chmod a+r /etc/apt/keyrings/docker.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              sudo apt-get update -y
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
              sudo systemctl enable docker
              sudo systemctl start docker
              sudo usermod -aG docker $USER
            fi

            # ── Ensure Docker is running ──
            sudo systemctl start docker

            # ── Clone or pull the repo ──
            APP_DIR=~/tb_web_sql_ci_cd-main

            if [ -d "$APP_DIR/.git" ]; then
              echo "Pulling latest changes..."
              cd $APP_DIR
              git fetch --all
              git reset --hard origin/main
            else
              echo "Cloning repository..."
              git clone https://github.com/${{ github.repository }}.git $APP_DIR
              cd $APP_DIR
            fi

            # ── Create .env file from secrets ──
            echo "DB_HOST=mysql" > $APP_DIR/.env
            echo "DB_USER=${{ secrets.DB_USER }}" >> $APP_DIR/.env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> $APP_DIR/.env
            echo "DB_NAME=${{ secrets.DB_NAME }}" >> $APP_DIR/.env
            echo "BOT_TOKEN=${{ secrets.BOT_TOKEN }}" >> $APP_DIR/.env

            # ── Verify .env is valid ──
            echo "=== .env contents (masked) ==="
            cat $APP_DIR/.env | sed 's/=.*/=***/'

            # ── Remove old volume on first deploy to avoid password mismatch ──
            cd $APP_DIR
            sudo docker compose down --remove-orphans --volumes

            # ── Build and start ──
            sudo docker compose up --build -d

            # ── Wait for MySQL to be healthy ──
            echo "Waiting for MySQL to become healthy..."
            for i in $(seq 1 30); do
              STATUS=$(sudo docker inspect --format='{{.State.Health.Status}}' tb_web_sql_ci_cd_main-mysql-1 2>/dev/null || echo "not_found")
              echo "  Attempt $i/30: MySQL status = $STATUS"
              if [ "$STATUS" = "healthy" ]; then
                echo "MySQL is healthy!"
                break
              fi
              if [ "$i" = "30" ]; then
                echo "MySQL failed to become healthy. Container logs:"
                sudo docker logs tb_web_sql_ci_cd_main-mysql-1 --tail 50
                exit 1
              fi
              sleep 5
            done

            # ── Show running containers ──
            sudo docker compose ps

            # ── Cleanup old images ──
            sudo docker image prune -f

            echo "Deployment complete!"